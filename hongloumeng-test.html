let currentPage = 0;

function startTest() {

}

function buildQuizPages() {
  const container = document.getElementById('quiz-container');
  questions.forEach((q, i) => {
    const page = document.createElement('div');
    page.className = 'page';
    page.id = 'page-q' + i;
    page.innerHTML = `
      <div class="progress-bar"><div class="progress-fill" id="prog-${i}"></div></div>
      <div class="progress-text">绗?${i+1} / 15 棰?/div>
      <div class="question-title">${q.q}</div>
      ${q.opts.map((opt, j) => `
        <div class="option" id="opt-${i}-${j}" onclick="selectOption(${i}, ${j})">
          <span class="opt-label">${'ABCD'[j]}</span>${opt}
        </div>
      `).join('')}
      <div class="btn-row">
        ${i > 0 ? `<button class="btn btn-prev" onclick="goToPage(${i-1})">涓婁竴棰?/button>` : '<div></div>'}
        ${i < 14 ? `<button class="btn btn-next" id="next-${i}" onclick="goToPage(${i+1})" disabled>涓嬩竴棰?/button>` : `<button class="btn btn-submit" id="next-${i}" onclick="showResult()" disabled>鏌ョ湅缁撴灉</button>`}
      </div>
    `;
    container.appendChild(page);
  });
}

function selectOption(qIdx, optIdx) {
  answers[qIdx] = optIdx;
  // update UI
  for (let j = 0; j < 4; j++) {
    document.getElementById(`opt-${qIdx}-${j}`).classList.remove('selected');
  }
  document.getElementById(`opt-${qIdx}-${optIdx}`).classList.add('selected');
  // enable next/submit
  document.getElementById(`next-${qIdx}`).disabled = false;
  // update progress
  const filled = answers.filter(a => a !== null).length;
  document.getElementById(`prog-${qIdx}`).style.width = (filled / 15 * 100) + '%';
}

function goToPage(idx) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  if (idx === -1) {
    document.getElementById('page-cover').classList.add('active');
  } else {
    const page = document.getElementById('page-q' + idx);
    page.classList.add('active');
    currentPage = idx;
    // restore selection
    if (answers[idx] !== null) {
      document.getElementById(`opt-${idx}-${answers[idx]}`).classList.add('selected');
    }
  }
}

function showResult() {
  // Count answers
  const counts = { A: 0, B: 0, C: 0, D: 0 };
  answers.forEach(a => { if (a !== null) counts['ABCD'[a]]++; });

  // Decide character
  let mainChar = '璐惧疂鐜?;
  const maxCount = Math.max(counts.A, counts.B, counts.C, counts.D);
  const maxLetters = Object.keys(counts).filter(k => counts[k] === maxCount);

  // Priority mapping
  if (maxLetters.includes('A')) {
    // Check if瀹濈帀 or 鏅撮洴
    if (counts.D >= 5) mainChar = '鏅撮洴';
    else if (counts.B >= 5 && counts.A >= 4) mainChar = '鏋楅粵鐜?;
    else mainChar = '璐惧疂鐜?;
  }
  if (maxLetters.includes('B') && !maxLetters.includes('A')) {
    if (counts.A >= 4) mainChar = '鏋楅粵鐜?;
    else mainChar = '鏋楅粵鐜?;
  }
  if (maxLetters.includes('C') && !maxLetters.includes('A') && !maxLetters.includes('B')) {
    // 瀹濋挆 or 鐜嬬啓鍑?    if (counts.D >= 4) mainChar = '鐜嬬啓鍑?;
    else mainChar = '钖涘疂閽?;
  }
  if (maxLetters.includes('D') && !maxLetters.includes('A') && !maxLetters.includes('B') && !maxLetters.includes('C')) {
    if (counts.A >= 4) mainChar = '鏅撮洴';
    else if (counts.C >= 4) mainChar = '鐜嬬啓鍑?;
    else mainChar = '鏅撮洴';
  }

  // Special mixed cases
  if (counts.A >= 4 && counts.C >= 4) {
    // 瀹濈帀+瀹濋挆娣峰悎
    if (counts.B >= 3) mainChar = '鍙叉箻浜?;
    else mainChar = '钖涘疂閽?;
  }
  if (counts.B >= 5 && counts.C >= 4) mainChar = '钖涘疂閽?;
  if (counts.A >= 3 && counts.D >= 3) mainChar = '鏅撮洴';

  // Show result
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  const resultPage = document.getElementById('page-result');
  resultPage.classList.add('active');

  const r = results[mainChar];
  document.getElementById('result-content').innerHTML = `
    <div class="result-character">${mainChar}</div>
    <div class="result-title">${r.title}</div>
    <div class="result-tags">${r.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>
    <div class="result-body">${r.desc}</div>
    <button class="btn-restart" onclick="restartTest()">閲嶆柊娴嬭瘯</button>
  `;
}

function restartTest() {
  answers = new Array(15).fill(null);
  currentPage = 0;
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-cover').classList.add('active');

  for (let i = 0; i < 15; i++) {
    for (let j = 0; j < 4; j++) {
      const el = document.getElementById(`opt-${i}-${j}`);
      if (el) el.classList.remove('selected');

    const btn = document.getElementById(`next-${i}`);
    if (btn) btn.disabled = true;
